<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Application input screen</title>
  <desc id="desc">Streamlit application input screen with controls, incident input, sample incidents, and local-first safety message.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .ui { font-family: Segoe UI, Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 800; fill: #1f2937; }
      .subtitle { font-size: 16px; fill: #8b95a1; }
      .heading { font-size: 20px; font-weight: 800; fill: #111827; }
      .label { font-size: 14px; fill: #111827; }
      .muted { font-size: 14px; fill: #6b7280; }
      .disabled { font-size: 14px; fill: #a7adb6; }
      .button { font-size: 14px; font-weight: 700; fill: #ffffff; }
      .notice { font-size: 17px; fill: #0b579f; }
    </style>
  </defs>

  <rect width="1600" height="720" fill="#ffffff"/>
  <rect x="0" y="0" width="300" height="720" fill="#eef2f7"/>

  <g class="ui">
    <text class="heading" x="16" y="48">Controls</text>
    <rect x="16" y="82" width="32" height="17" rx="8.5" fill="#ff4b5c"/>
    <circle cx="39" cy="90.5" r="7" fill="#ffffff"/>
    <text class="label" x="56" y="96">Use Google ADK workflow</text>
    <circle cx="226" cy="89" r="8" fill="none" stroke="#8b95a1" stroke-width="1.5"/>
    <text class="muted" x="223" y="94">?</text>

    <rect x="16" y="118" width="260" height="78" rx="8" fill="#dbeafe"/>
    <text class="notice" x="32" y="150">No GOOGLE_API_KEY: local triage</text>
    <text class="notice" x="32" y="176">remains available.</text>

    <rect x="16" y="220" width="15" height="15" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
    <text class="disabled" x="40" y="232">Approve sharing redacted text with</text>
    <text class="disabled" x="40" y="254">Gemini</text>
    <circle cx="268" cy="235" r="8" fill="none" stroke="#8b95a1" stroke-width="1.5"/>
    <text class="muted" x="265" y="240">?</text>

    <rect x="16" y="285" width="32" height="17" rx="8.5" fill="#d1d5db"/>
    <circle cx="24" cy="293.5" r="7" fill="#ffffff"/>
    <text class="label" x="56" y="296">Store redacted incident in local</text>
    <text class="label" x="56" y="318">memory</text>
    <circle cx="268" cy="302" r="8" fill="none" stroke="#8b95a1" stroke-width="1.5"/>
    <text class="muted" x="265" y="307">?</text>

    <line x1="16" y1="378" x2="276" y2="378" stroke="#cbd5e1"/>
    <text class="heading" x="16" y="438">Sample incidents</text>
    <text class="label" x="16" y="476">Load sample incident</text>
    <rect x="16" y="492" width="260" height="42" rx="8" fill="#ffffff"/>
    <text class="label" x="32" y="518">-- Select sample --</text>
    <path d="M252 509 L260 517 L268 509" fill="none" stroke="#111827" stroke-width="2"/>

    <text class="title" x="380" y="116">SQL Server Incident Triage Agent</text>
    <text class="subtitle" x="382" y="158">ADK multi-agent triage with read-only MCP tools and local fallback</text>

    <text class="label" x="382" y="205">Incident input</text>
    <rect x="382" y="220" width="1165" height="250" rx="8" fill="#f0f2f6"/>
    <text class="label" x="398" y="249">Paste SQL Server error log, SQL Agent job history, replication error, backup failure, Query Store finding, or DMV output here.</text>

    <rect x="382" y="492" width="126" height="42" rx="8" fill="#ff4b5c" filter="url(#shadow)"/>
    <text class="button" x="398" y="519">Analyze Incident</text>

    <rect x="760" y="492" width="790" height="58" rx="8" fill="#e8f2ff"/>
    <text class="notice" x="780" y="528">The local engine always runs first. External AI and memory require separate opt-in controls.</text>
  </g>
</svg>
