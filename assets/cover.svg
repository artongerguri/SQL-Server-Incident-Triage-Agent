<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SQL Server Incident Triage Agent</title>
  <desc id="desc">Cover image for the Kaggle AI Agents capstone project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1370" cy="120" r="220" fill="#38bdf8" opacity="0.14"/>
  <circle cx="160" cy="760" r="280" fill="#2dd4bf" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="120" y="120" width="1360" height="660" rx="36" fill="#f8fafc" opacity="0.96"/>
  </g>

  <text x="180" y="235" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#2563eb">
    Kaggle AI Agents Vibe Coding Capstone
  </text>
  <text x="180" y="345" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="800" fill="#0f172a">
    SQL Server Incident
  </text>
  <text x="180" y="430" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="800" fill="#0f172a">
    Triage Agent
  </text>
  <text x="180" y="515" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#334155">
    ADK multi-agent workflow + read-only MCP tools + privacy guardrails
  </text>

  <g transform="translate(180 590)">
    <rect width="320" height="86" rx="18" fill="#dbeafe"/>
    <text x="30" y="53" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#1e40af">Triage</text>
  </g>
  <g transform="translate(540 590)">
    <rect width="320" height="86" rx="18" fill="#ccfbf1"/>
    <text x="30" y="53" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#115e59">Safety Review</text>
  </g>
  <g transform="translate(900 590)">
    <rect width="360" height="86" rx="18" fill="#ede9fe"/>
    <text x="30" y="53" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#5b21b6">DBA Action Plan</text>
  </g>

  <path d="M500 633H540" stroke="#64748b" stroke-width="8" stroke-linecap="round"/>
  <path d="M860 633H900" stroke="#64748b" stroke-width="8" stroke-linecap="round"/>

  <g transform="translate(1110 195)">
    <rect width="245" height="245" rx="28" fill="#0f172a"/>
    <path d="M117 62v122M72 106h90M72 146h90" stroke="#38bdf8" stroke-width="16" stroke-linecap="round"/>
    <circle cx="170" cy="180" r="24" fill="#2dd4bf"/>
  </g>
